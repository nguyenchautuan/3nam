<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Photo Carousel ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Be+Vietnam+Pro:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
  }

  :root {
    --pink: #ff6b9d;
    --purple: #c084fc;
    --dark: #07060f;
    --dark2: #120f20;
    --glow: rgba(255, 107, 157, 0.25);
  }

  body {
    background: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Be Vietnam Pro', sans-serif;
    overflow: hidden;
  }

  /* STARS BACKGROUND */
  #stars-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* GLOW ORB */
  .glow-orb {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(192,132,252,0.12) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
  }

  /* TITLE */
  .title-wrap {
    position: relative;
    z-index: 10;
    text-align: center;
    margin-bottom: 28px;
    animation: fadeDown 1.2s ease forwards;
  }

  .title-wrap h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(24px, 4vw, 42px);
    font-weight: 700;
    color: white;
    letter-spacing: 1px;
  }

  .title-wrap h1 span {
    background: linear-gradient(135deg, var(--pink), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .title-wrap p {
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    margin-top: 6px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 300;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* SCENE */
  #scene {
    position: relative;
    z-index: 10;
    width: min(700px, 96vw);
    height: min(480px, 60vw);
    perspective: 1000px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: grab;
  }

  #scene:active { cursor: grabbing; }

  #carousel {
    position: relative;
    width: 0; height: 0;
    transform-style: preserve-3d;
  }

  /* PHOTO CARD */
  .photo-card {
    position: absolute;
    width: 150px;
    height: 200px;
    transform-style: preserve-3d;
    border-radius: 14px;
    overflow: hidden;
    border: 1.5px solid rgba(255,255,255,0.1);
    cursor: pointer;
    transition: border-color 0.3s;
    will-change: transform, filter;
  }

  .photo-card:hover {
    border-color: rgba(255,107,157,0.6);
  }

  .photo-card img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
    border-radius: 14px;
  }

  .photo-placeholder {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    border-radius: 14px;
  }

  .photo-placeholder .icon {
    font-size: 30px;
    opacity: 0.8;
  }

  .photo-placeholder .num {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    font-family: 'Be Vietnam Pro', sans-serif;
    font-weight: 300;
    letter-spacing: 1px;
  }

  .caption {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 28px 10px 10px;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    color: white;
    font-size: 11px;
    text-align: center;
    font-family: 'Be Vietnam Pro', sans-serif;
    font-weight: 400;
    opacity: 0;
    transition: opacity 0.3s;
    border-radius: 0 0 14px 14px;
    line-height: 1.4;
  }

  .photo-card:hover .caption { opacity: 1; }

  /* CONTROLS */
  .controls {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 24px;
    margin-top: 28px;
    animation: fadeUp 1.2s ease 0.4s both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .ctrl-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .ctrl-group label {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 300;
  }

  .ctrl-group .val {
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    font-weight: 500;
    min-width: 28px;
    text-align: center;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 110px;
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--pink);
    cursor: pointer;
    box-shadow: 0 0 8px rgba(255,107,157,0.6);
  }

  .divider {
    width: 1px;
    height: 40px;
    background: rgba(255,255,255,0.08);
  }

  /* BTN PAUSE */
  .btn-pause {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.04);
    color: white;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .btn-pause:hover {
    border-color: var(--pink);
    background: rgba(255,107,157,0.1);
  }

  /* HINT */
  .hint {
    position: relative;
    z-index: 10;
    margin-top: 18px;
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 300;
    animation: fadeUp 1.2s ease 0.7s both;
  }

  /* UPLOAD NOTE */
  .upload-note {
    position: relative;
    z-index: 10;
    margin-top: 14px;
    font-size: 11px;
    color: rgba(255,107,157,0.45);
    font-style: italic;
    animation: fadeUp 1.2s ease 0.9s both;
  }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<div class="glow-orb"></div>

<div class="title-wrap">
  <h1>❤️ <span>Our Memories</span> ❤️</h1>
  <p>Châu Tuấn &amp; Thảo Quyên · Since 06.06.2023</p>
</div>

<div id="scene">
  <div id="carousel"></div>
</div>

<div class="controls">
  <div class="ctrl-group">
    <label>Tốc độ xoay</label>
    <div class="slider-row">
      <input type="range" id="speed" min="0" max="100" value="30" step="1">
      <span class="val" id="speed-val">30</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="ctrl-group">
    <label>Thu phóng</label>
    <div class="slider-row">
      <input type="range" id="zoom" min="50" max="160" value="100" step="1">
      <span class="val" id="zoom-val">100%</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="ctrl-group">
    <label>Tạm dừng</label>
    <button class="btn-pause" id="btn-pause" title="Pause / Play">⏸</button>
  </div>
</div>

<div class="hint">Kéo chuột để xoay · Cuộn để thu phóng</div>
<div class="upload-note">Thay src ảnh trong mã nguồn để dùng ảnh thật của bạn</div>

<script>
/* ========== STARS ========== */
const starCanvas = document.getElementById('stars-canvas');
const ctx = starCanvas.getContext('2d');
let stars = [];

function resizeStars() {
  starCanvas.width = window.innerWidth;
  starCanvas.height = window.innerHeight;
  stars = Array.from({ length: 160 }, () => ({
    x: Math.random() * starCanvas.width,
    y: Math.random() * starCanvas.height,
    r: Math.random() * 1.2 + 0.2,
    a: Math.random(),
    da: (Math.random() - 0.5) * 0.008
  }));
}
resizeStars();
window.addEventListener('resize', resizeStars);

function drawStars() {
  ctx.clearRect(0, 0, starCanvas.width, starCanvas.height);
  stars.forEach(s => {
    s.a = Math.max(0.05, Math.min(1, s.a + s.da));
    if (s.a <= 0.05 || s.a >= 1) s.da *= -1;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.a})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

/* ========== CAROUSEL ========== */
const TOTAL = 21;
const RADIUS = 300;

// Thay src ảnh ở đây — đặt đường dẫn ảnh thật của bạn vào mảng imgSrc bên dưới
// Ví dụ: "/static/images/2023_1.jpg"
// Nếu để rỗng (""), sẽ hiện placeholder màu sắc
const imgSrc = [
  "/static/images/anh1.png",
  "/static/images/anh2.jpeg",
  "/static/images/anh3.jpeg",
  "/static/images/anh4.jpeg",
  "/static/images/anh5.jpeg",
  "/static/images/anh7.jpg",
  "/static/images/anh19.jpg",
  "/static/images/anh20.jpg",
  "/static/images/anh21.jpeg",
  "/static/images/anh22.jpeg",
  "/static/images/anh23.png",
  "/static/images/anh24.jpeg",
  "/static/images/anh25.JPG",
  "/static/images/anh26.PNG",
  "/static/images/IMG_0959.jpg",
  "/static/images/IMG_1372.jpg",
  "/static/images/IMG_1485.jpg",
  "/static/images/IMG_1503.jpg",
  "/static/images/IMG_1962.jpg",
  "/static/images/IMG_4490.jpg",
  "/static/images/IMG_4870.jpg"
];

const labels = [
  "❤️"," ✈️","🌸",
  "🎂","☕","☀️","🌿",
  " 🍜","🌙","🏖️"," 🛣️",
  "🍂","📚"," 🌧️"," 💍",
  "🏮"," 📸"," 😊",
  "🌅","💞","💌"
];

const bgColors = [
  "#3d1a2e","#1a1a3d","#1a2e1a","#2e2a1a","#2e1a2e",
  "#1a2e2e","#2e1a1a","#1f1a3d","#1a2e1f","#2e261a",
  "#1a1f3d","#3d1a1f","#1a3d26","#2e1a2e","#1a2e2e",
  "#2a3d1a","#1f1a2e","#3d2a1a","#1a1f2e","#2e1a1f","#1a2e3d"
];

const icons = ["📷","💕","🌸","🎂","☕","🌊","🌿","🍜","🌙","🏖️","🛣️","🍂","📚","🌧️","💍","🏮","📸","😊","🌅","💞","💌"];

const carousel = document.getElementById('carousel');
const cards = [];

for (let i = 0; i < TOTAL; i++) {
  const angle = (i / TOTAL) * 2 * Math.PI;
  const x = Math.sin(angle) * RADIUS;
  const z = Math.cos(angle) * RADIUS;

  const card = document.createElement('div');
  card.className = 'photo-card';
  card.style.transform = `translateX(${x}px) translateZ(${z}px)`;

  if (imgSrc[i]) {
    card.innerHTML = `
      <img src="${imgSrc[i]}" alt="${labels[i]}">
      <div class="caption">${labels[i]}</div>
    `;
  } else {
    card.innerHTML = `
      <div class="photo-placeholder" style="background:${bgColors[i]};">
        <div class="icon">${icons[i]}</div>
        <div class="num">Ảnh ${i + 1}</div>
      </div>
      <div class="caption">${labels[i]}</div>
    `;
  }

  carousel.appendChild(card);
  cards.push({ el: card, angle });
}

/* ========== STATE ========== */
let rotY = 0, rotX = 10;
let autoSpeed = 0.3;
let scaleFactor = 1;
let paused = false;
let isDragging = false;
let lastX = 0, lastY = 0;
let velX = 0, velY = 0;

/* ========== CONTROLS ========== */
const speedInput = document.getElementById('speed');
const speedValEl = document.getElementById('speed-val');
const zoomInput = document.getElementById('zoom');
const zoomValEl = document.getElementById('zoom-val');
const btnPause = document.getElementById('btn-pause');

speedInput.addEventListener('input', () => {
  autoSpeed = speedInput.value / 100;
  speedValEl.textContent = speedInput.value;
});

zoomInput.addEventListener('input', () => {
  scaleFactor = zoomInput.value / 100;
  zoomValEl.textContent = zoomInput.value + '%';
});

btnPause.addEventListener('click', () => {
  paused = !paused;
  btnPause.textContent = paused ? '▶' : '⏸';
});

/* ========== MOUSE ========== */
const scene = document.getElementById('scene');

scene.addEventListener('mousedown', e => {
  isDragging = true;
  lastX = e.clientX; lastY = e.clientY;
  velX = 0; velY = 0;
});

window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  velX = dx * 0.45;
  velY = dy * 0.2;
  rotY += dx * 0.38;
  rotX += dy * 0.15;
  rotX = Math.max(-40, Math.min(40, rotX));
  lastX = e.clientX; lastY = e.clientY;
});

window.addEventListener('mouseup', () => { isDragging = false; });

scene.addEventListener('wheel', e => {
  e.preventDefault();
  scaleFactor -= e.deltaY * 0.0012;
  scaleFactor = Math.max(0.45, Math.min(1.7, scaleFactor));
  zoomInput.value = Math.round(scaleFactor * 100);
  zoomValEl.textContent = Math.round(scaleFactor * 100) + '%';
}, { passive: false });

/* ========== TOUCH ========== */
scene.addEventListener('touchstart', e => {
  isDragging = true;
  lastX = e.touches[0].clientX;
  lastY = e.touches[0].clientY;
  velX = 0; velY = 0;
}, { passive: true });

scene.addEventListener('touchmove', e => {
  if (!isDragging) return;
  const dx = e.touches[0].clientX - lastX;
  const dy = e.touches[0].clientY - lastY;
  velX = dx * 0.45;
  velY = dy * 0.2;
  rotY += dx * 0.38;
  rotX += dy * 0.15;
  rotX = Math.max(-40, Math.min(40, rotX));
  lastX = e.touches[0].clientX;
  lastY = e.touches[0].clientY;
}, { passive: true });

scene.addEventListener('touchend', () => { isDragging = false; });

/* ========== RENDER LOOP ========== */
function render() {
  if (!isDragging && !paused) {
    if (Math.abs(velX) > 0.05) {
      rotY += velX;
      velX *= 0.94;
    } else {
      rotY += autoSpeed;
    }
    if (Math.abs(velY) > 0.05) {
      rotX += velY;
      velY *= 0.94;
      rotX = Math.max(-40, Math.min(40, rotX));
    }
  }

  carousel.style.transform = `scale(${scaleFactor}) rotateX(${rotX}deg) rotateY(${rotY}deg)`;

  const radY = rotY * Math.PI / 180;

  cards.forEach(({ el, angle }) => {
    const cardAngle = angle - radY;
    const cosA = Math.cos(cardAngle);
    const depth = (cosA + 1) / 2;

    const brightness = 0.45 + depth * 0.6;
    el.style.filter = `brightness(${brightness})`;
    el.style.zIndex = Math.round(depth * 100);

    const w = 150 + depth * 30;
    const h = 200 + depth * 30;
    el.style.width = w + 'px';
    el.style.height = h + 'px';
    el.style.left = -(w / 2) + 'px';
    el.style.top = -(h / 2) + 'px';
  });

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
